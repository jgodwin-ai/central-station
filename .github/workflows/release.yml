name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Test
        working-directory: app
        run: swift test

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build-dmg.sh "$VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/*.dmg
