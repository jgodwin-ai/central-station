name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: app
        run: swift build -c release

      - name: Test
        working-directory: app
        run: swift test
